databases:
  - name: cryptovault-db
    databaseName: cryptovault
    user: admin

services:
  # 1. Backend Spring Boot Database & API Service
  - type: web
    name: cryptovault-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # Render's internal PostgreSQL URLs start with postgres://, which Spring Boot auto-detects
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: cryptovault-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: cryptovault-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: cryptovault-db
          property: password

  # 2. Frontend React Client Application
  - type: web
    name: cryptovault-frontend
    env: static
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/build"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: cryptovault-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
