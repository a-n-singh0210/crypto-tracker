services:
  # 1. Backend Spring Boot Database & API Service
  - type: web
    name: cryptovault-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/test?useSSL=true" 
      - key: SPRING_DATASOURCE_USERNAME
        value: "3WbpNS6PQcNJyMp.root"
      - key: SPRING_DATASOURCE_PASSWORD
        # IMPORTANT: Replace YOUR_DB_PASSWORD below with the real password before pushing, 
        # OR edit this environment variable securely in your Render Dashboard!
        value: "wN8o5NlCpqziutM0"

  # 2. Frontend React Client Application
  - type: web
    name: cryptovault-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/build"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: cryptovault-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
